*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#050507;color:#f0f0f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}
#app{height:100%;display:flex;flex-direction:column}
#view{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
#nav{flex-shrink:0;display:flex;background:#08080c;border-top:1px solid #16161e;padding-bottom:env(safe-area-inset-bottom)}
.nb{flex:1;border:none;background:transparent;color:#3a3a4a;padding:10px 2px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;border-top:2px solid transparent;transition:all 0.2s;font-family:inherit}
.nb.on{color:#7C3AED;border-top-color:#7C3AED}
.nb .ni{font-size:17px}
.nb .nl{font-size:7px;letter-spacing:1.5px;font-weight:600;text-transform:uppercase}
h1{font-size:26px;font-weight:800;letter-spacing:-0.5px;line-height:1.1}
h2{font-size:20px;font-weight:700}
h3{font-size:15px;font-weight:700}
.label{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#4a4a5a}
.mono{font-family:'SF Mono',monospace}
.px{padding-left:20px;padding-right:20px}
.section{padding:20px 20px 0}
.surface{background:#0c0c12;border:1px solid #16161e;border-radius:12px}
.surface-hi{background:#100e1a;border:1px solid #2a1a4a;border-radius:12px}
.divider{height:1px;background:#12121a;margin:0 20px}
.chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1px}
.chip-purple{background:rgba(124,58,237,0.15);color:#a78bfa;border:1px solid rgba(124,58,237,0.3)}
.chip-gold{background:rgba(245,158,11,0.12);color:#fbbf24;border:1px solid rgba(245,158,11,0.25)}
.chip-green{background:rgba(16,185,129,0.12);color:#34d399;border:1px solid rgba(16,185,129,0.25)}
.chip-blue{background:rgba(6,182,212,0.12);color:#22d3ee;border:1px solid rgba(6,182,212,0.25)}
.chip-pink{background:rgba(244,114,182,0.12);color:#f9a8d4;border:1px solid rgba(244,114,182,0.25)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-box{background:#0c0c12;border:1px solid #16161e;border-radius:10px;padding:14px;text-align:center}
.stat-val{font-size:22px;font-weight:800;letter-spacing:-0.5px}
.stat-lbl{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#4a4a5a;margin-top:2px}
.pay-table{border-radius:10px;overflow:hidden;border:1px solid #16161e}
.pay-row{display:grid;gap:2px;padding:11px 14px;font-family:'SF Mono',monospace;font-size:11px}
.pay-row-4{grid-template-columns:1.3fr 1fr 1fr 1fr}
.pay-head{background:#0c0c12;color:#4a4a5a;font-size:9px;font-weight:700;letter-spacing:2px}
.pay-even{background:#090910}
.pay-odd{background:#0b0b13}
.prog-track{position:relative;padding-left:28px}
.prog-line{position:absolute;left:10px;top:16px;bottom:0;width:2px;background:#16161e}
.prog-item{position:relative;margin-bottom:16px}
.prog-dot{position:absolute;left:-28px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid transparent;top:2px}
.prog-body{background:#0c0c12;border:1px solid #16161e;border-radius:10px;padding:14px}
.story-card{background:#0c0c12;border:1px solid #16161e;border-radius:12px;overflow:hidden;margin-bottom:12px;cursor:pointer}
.story-body{padding:14px}
.mod-card{background:#0c0c12;border:1px solid #16161e;border-radius:12px;padding:16px;margin-bottom:10px;cursor:pointer}
.lesson-item{background:#08080c;border-radius:8px;padding:14px;margin-bottom:8px;cursor:pointer}
.back-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:#7C3AED;font-size:13px;font-weight:600;cursor:pointer;padding:0;margin-bottom:16px}
.sched-row{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid #10101a}
.sched-time{font-size:11px;font-weight:700;color:#7C3AED;font-family:'SF Mono',monospace;min-width:65px;padding-top:2px}
.sched-title{font-size:13px;font-weight:600;margin-bottom:2px}
.sched-note{font-size:11px;color:#5a5a6a;line-height:1.5}
.page-header{background:linear-gradient(180deg,#120828 0%,#050507 100%);padding:28px 20px 20px;border-bottom:1px solid #16161e}
.region-bar{display:flex;gap:8px;overflow-x:auto;padding:14px 20px;scrollbar-width:none}
.region-bar::-webkit-scrollbar{display:none}
.region-pill{flex:0 0 auto;padding:8px 16px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid transparent;transition:all 0.2s}
.pb-safe{padding-bottom:90px}
.card-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}

const STORIES = {"mamba": [{"role": "#1 Rookie Closer", "name": "Esteban", "region": "Mamba U", "earned": "$100,000+", "year": "2024", "color": "#F59E0B", "chip": "chip-gold", "emoji": "\u2b50", "headline": "Setter to $100K Rookie Closer in One Year", "story": "Esteban joined Mamba U as a setter with zero solar experience. Most reps spend years working up to closer \u2014 Esteban did it in one.\n\nHe started by mastering the set. Every door, every objection, every tie-down until it was automatic. When he transitioned to closer, he already knew the homeowner's mindset \u2014 because he had been the one putting them in front of closers.\n\nBy the end of his rookie year he had crossed $100,000 in earnings. His path: Setter, Setter Captain, then Closer \u2014 all within 12 months.\n\nHis edge was not talent. It was repetition. He drilled the framework daily, tracked his own metrics obsessively, and never accepted a plateau as permanent.", "lessons": ["Master the set before you close \u2014 setters who transition know the pitch from both sides", "Track every metric yourself \u2014 do not wait for a manager to show you your numbers", "The fastest path to the closer role is being the best setter in the room"]}, {"role": "#1 Vet Closer", "name": "Andrew Fuller", "region": "Mamba U", "earned": "$600,000", "year": "2025", "color": "#F59E0B", "chip": "chip-gold", "emoji": "\ud83d\udc8e", "headline": "6 Years in D2D. $600K Closing in 2025.", "story": "Andrew Fuller has been working doors since before most of his teammates were in the industry. Six years of refinement, six years of studying homeowners, and six years building a close rate that most reps never reach.\n\nIn 2025 he put up $600,000 in closer earnings at Mamba U.\n\nWhat separates Andrew is not a secret technique \u2014 it is the fundamentals executed perfectly, every single time. He never skips rapport. He never rushes the pain. He never closes before the homeowner is ready.\n\nHe is proof that mastery in this industry compounds. Every year you stay sharp, your numbers go up.", "lessons": ["Elite closers never rush the trust-building phase", "Longevity in D2D requires constant skill refinement \u2014 never stop learning", "Consistent fundamentals over years outperform flashy techniques that fade"]}, {"role": "Manager", "name": "Christopher Buckland", "region": "Mamba U", "earned": "$1,200,000", "year": "2025", "color": "#F59E0B", "chip": "chip-gold", "emoji": "\ud83d\udc51", "headline": "Setter to Manager in 3 Years. $750K in 2025.", "story": "Christopher Buckland started as a setter in summer 2022. Three years later he is the Manager of Mamba U who pulled $1,200,000 in 2025.\n\nTrack: Setter (Summer 2022), Setter Captain, Closer, then Manager (2025).\n\nWhat drove the climb was not just personal performance \u2014 it was his ability to make everyone around him better. He invested in his team's training, held people accountable, and built a culture where losing felt uncomfortable.\n\nAt RIV, management is not a reward for being a good individual rep. It is a role for people obsessed with building others. Christopher built that reputation early, and the title followed.", "lessons": ["Leadership is earned by elevating others \u2014 not just personal stats", "Career progression at RIV is fast for people who invest in their team", "Start building leadership habits as a setter \u2014 do not wait for the title"]}], "spartan": [{"role": "#1 Rookie Setter", "name": "Damian Biggs", "region": "Spartan U", "earned": "$100,000", "year": "2025", "color": "#7C3AED", "chip": "chip-purple", "emoji": "\u2b50", "headline": "Top Rookie Setter of Spartan U. $100K in 2025.", "story": "Damian Biggs came into Spartan U and immediately stood out \u2014 not because of any special background, but because of his consistency and work ethic on the doors.\n\nAs a setter, Damian focused on one thing: quality appointments. He studied the tie-down, mastered the confirmation process, and kept his no-show rate lower than almost anyone in the office.\n\nThe result was $100,000 in his rookie year as a setter \u2014 a number that most reps do not hit until they make the closer transition. Damian proved you do not need to be a closer to earn like one.", "lessons": ["Quality appointments beat volume \u2014 a tight confirmation process changes your income", "You do not need to be a closer to earn six figures \u2014 master the setter role completely", "Consistency on the doors every single day compounds faster than any single big week"]}, {"role": "#1 Rookie Closer", "name": "Marquese Mingo", "region": "Spartan U", "earned": "$300,000", "year": "2025", "color": "#7C3AED", "chip": "chip-purple", "emoji": "\ud83d\udd25", "headline": "Rookie Closer. $300K in His First Year Closing.", "story": "Marquese Mingo made the transition from setter to closer and immediately produced at an elite level. $300,000 in his first year as a closer at Spartan U is a number that puts him among the best in the company.\n\nWhat made Marquese dangerous in the in-home was his ability to listen. Where most new closers rush to present, Marquese slowed down and discovered. He let homeowners tell him their pain before he offered any solution.\n\nThat discovery-first approach meant his close rate was higher than reps with years more experience. $300,000 is the result of doing the fundamentals better than everyone else in the room.", "lessons": ["Discovery before presentation \u2014 let the homeowner tell you their pain before you solve it", "New closers who listen out-earn experienced closers who pitch", "The fundamentals executed at a high level beat any advanced technique"]}, {"role": "#1 Vet Closer", "name": "Ezequiel Neveraz", "region": "Spartan U", "earned": "$400,000", "year": "2025", "color": "#7C3AED", "chip": "chip-purple", "emoji": "\ud83d\udc8e", "headline": "Spartan U's Top Vet Closer. $400K in 2025.", "story": "Ezequiel Neveraz has built his reputation at Spartan U on one thing: he does not lose y": "Carlos joined Solar X when Puerto Rico was still an early-stage market for RIV. He used the low saturation as an edge.\n\nHomeowners in PR had not been knocked as heavily. Carlos adjusted his opener to lead with education first, and found that once homeowners understood their options, they were highly receptive.\n\n$67,000 in year one, with an upward trajectory as Solar X continues to expand across the island.", "lessons": ["Low-saturation markets reward education-first openers", "Adapt your approach to the market \u2014 PR is not SoCal", "Being early in a growing market is a long-term advantage"]}, {"role": "#1 Closer", "name": "Miguel A.", "region": "Solar X", "earned": "$185,000", "year": "2025", "color": "#06B6D4", "chip": "chip-blue", "emoji": "\ud83d\udc8e", "headline": "Island's Top Closer. $185K in the Caribbean Market.", "story": "Miguel understood something most reps miss in Puerto Rico: the utility pain is real and immediate. PREPA outages, high rates, and grid instability mean homeowners are not just interested in solar \u2014 many are desperate for it.\n\nHe built his entire pitch around energy independence, not just savings. That emotional angle resonated deeply, and his close rate was among the highest in the entire company.\n\n$185,000 in 2025. Solar X is becoming one of RIV's most exciting growth markets.", "lessons": ["Know your market's specific pain \u2014 in PR it is reliability, not just savings", "Emotional resonance closes deals that logic alone cannot", "Solar X is a high-upside market \u2014 the reps who get in early will benefit most"]}, {"role": "Manager", "name": "Tin Tin", "region": "Solar X", "earned": "", "year": "2025", "color": "#06B6D4", "chip": "chip-blue", "emoji": "\ud83d\udc51", "headline": "Manager of Solar X \u2014 Building RIV's Caribbean Region.", "story": "Tin Tin manages Solar X, RIV's Puerto Rico region \u2014 one of the most exciting growth markets in the entire company.\n\nLeading in Puerto Rico requires a different playbook than SoCal. Tin Tin has adapted the RIV training system to a market where homeowners are highly motivated by energy independence and grid reliability, not just savings.\n\nBuilding a region from the ground up while maintaining the culture and standards that define RIV is no small task. Tin Tin is doing it.", "lessons": ["Managing a new market requires adapting the playbook \u2014 not abandoning it", "Energy independence is the core message in Puerto Rico \u2014 lead with it", "Building a region from scratch is the hardest path and the highest upside"]}]};
const TRAINING = [{"id": 1, "tag": "FUNDAMENTALS", "title": "Know What You're Selling", "color": "#F59E0B", "badge": "chip-gold", "time": "30 min", "level": "Required \u2014 All Reps", "summary": "Before you knock a single door, you must be able to explain solar in plain language to a skeptical neighbor at a backyard barbecue. No jargon. No spec sheets. Just clarity.", "why": "The number one reason reps lose homeowners early is confusion. If you cannot explain how solar works, why it saves money, and how financing compares in under 2 minutes, you will lose the door before you ever earn the appointment.", "sections": [{"title": "How Solar Actually Works", "content": "Solar panels convert sunlight into DC electricity. An inverter converts that to AC for home use. Any excess goes to the grid via net metering, or into a battery. The homeowner's meter runs backward when they overproduce \u2014 that is their credit against future usage.\n\nSimple. Teachable. Memorize it. Then say it out loud to someone who knows nothing about solar until they understand it without asking a question."}, {"title": "Why It Saves Money", "content": "The utility company charges for every kWh used \u2014 and raises that rate every year. California utilities have averaged 5 to 8 percent annual rate increases for the past decade.\n\nSolar locks the homeowner's energy cost at a fixed rate for 25 years. The loan payment replaces the utility bill, typically at a lower monthly number. The homeowner stops renting energy from Edison and starts owning it.\n\nThis is the core financial argument. Know it cold."}, {"title": "Financing: The Three Options", "content": "LOAN: Homeowner owns the system. Eligible for the federal Investment Tax Credit (up to 30 percent). Monthly payment typically lower than current utility bill. Best long-term economics.\n\nLEASE OR PPA: Third party owns the system. Lower upfront risk but homeowner does not own or receive the tax credit. Good for homeowners who do not qualify for loans.\n\nCASH: Maximum savings, no interest. Best overall economics but requires capital. Rare at the door \u2014 but understand it and be able to explain it."}, {"title": "The Neighbor Test", "content": "Can you explain solar to a skeptical neighbor \u2014 someone who did not ask and does not care \u2014 in under 2 minutes, and have them say that actually makes sense?\n\nIf not, keep practicing. That is your qualification standard before you hit doors.\n\nDrill it with a roommate. Record yourself. Listen back. If it sounds like a pitch, start over. It should sound like a smart neighbor explaining something useful."}]}, {"id": 2, "tag": "THE DOOR", "title": "Mastering the First 30 Seconds", "color": "#7C3AED", "badge": "chip-purple", "time": "45 min", "level": "Required \u2014 All Reps", "summary": "Every sale is decided in the first 30 seconds. Tonality, body language, opener, and frame control determine whether you earn a conversation or get a door in your face.", "why": "Most reps lose at the door \u2014 not in the house. The reason is almost always the same: they come across as a salesperson, not a professional. This module fixes that.", "sections": [{"title": "Tonality: The Silent Closer", "content": "Your tone communicates certainty or desperation before a single word lands.\n\nCertainty sounds like: calm, deliberate, slightly slower than conversational, no uptick at the end of statements.\n\nDesperation sounds like: fast, high-pitched, uptick on every sentence as if asking for permission.\n\nDrill: Record yourself doing your opener. Listen back. Which one do you sound like? Do this until certainty is automatic."}, {"title": "The Opener Framework", "content": "Structure: Disarm, Identify, Position, Bridge to curiosity.\n\nExample: Hey, I am not here to sell you anything today. I am [name] with RIV Solar. We are in the area working with a few of your neighbors on their utility bills, and I just wanted to stop by real quick and show you what they are doing.\n\nBreakdown: Not here to sell you \u2014 disarms the guard. Working with neighbors \u2014 social proof. Show you what they are doing \u2014 curiosity gap. The homeowner's brain wants to know what the neighbors are doing. That is your entry."}, {"title": "Body Language Before You Speak", "content": "Stand 4 to 5 feet back from the door \u2014 not on the step. This reduces the subconscious threat response homeowners feel when someone is too close.\n\nArms relaxed, not crossed. Slight natural smile \u2014 not a sales grin. Make eye contact.\n\nDo not pull out a tablet, phone, or clipboard before you have built rapport. Nothing signals salesperson faster than leading with a device."}, {"title": "Frame Control: You Are the Professional", "content": "Frame is who controls the context of the interaction. Most reps let homeowners set the frame \u2014 I am not interested \u2014 and then panic.\n\nTop reps set the frame first and hold it. You do this by not reacting to early objections, moving the conversation forward with calm confidence, and behaving as if the appointment is already happening because you are just working out the details.\n\nIf a homeowner says not interested before you have finished your opener, do not skip a beat. Smile and keep going. Reacting to reflex responses trains homeowners that their reflexes work. Do not train them."}, {"title": "The 3-Question Qualifier", "content": "Do you own your home? Decision maker check.\n\nYou are the one who handles the utilities? Authority check.\n\nHave you seen what your neighbors have been doing about their electric bills lately? Curiosity open.\n\nIf they own, are the decision maker, and answer that third question with curiosity \u2014 you are in. Move to the discovery and tie-down. Do not add more questions. You have what you need."}]}, {"id": 3, "tag": "APPOINTMENT", "title": "Setting the Unbreakable Appointment", "color": "#10B981", "badge": "chip-green", "time": "40 min", "level": "Required \u2014 All Setters", "summary": "The difference between a weak set and a strong set is commitment. A weak set is we will see you Tuesday. A strong set has the homeowner looking forward to it.", "why": "No-shows kill income. The average no-show rate for weak sets is 40 to 60 percent. Reps who use the full tie-down and confirmation process run under 15 percent. This module is worth thousands of dollars per month.", "sections": [{"title": "The Pain Anchor", "content": "Before you book the appointment, the homeowner needs to feel their pain. Not intellectually understand it \u2014 feel it.\n\nExample: So you are paying around $280 a month. That is about $3,360 a year going to Edison. Over the next 10 years, at the rate they have been increasing, you are looking at $40,000 or more going to a utility company that gives you zero equity in return.\n\nLet that number land. Do not fill the silence. The pain anchor is what makes the appointment feel necessary \u2014 not optional."}, {"title": "The Value Statement", "content": "Bridge from pain to solution without over-explaining.\n\nThe reason I am here is that a lot of your neighbors have figured out how to lock in a rate lower than what they are paying now \u2014 and actually own the system. I am not going to get into all the details at the door, that is what the appointment is for, but I want to make sure you at least get to see if it makes sense for your situation.\n\nKey phrase: I am not going to get into all the details at the door. This is intentional. Scarcity of information creates desire for the appointment."}, {"title": "The Soft Tie-Down", "content": "Ask a question they can only say yes to if they are rational.\n\nIf there was a way to lower your monthly energy cost and actually own the system rather than rent it from Edison \u2014 that is something worth understanding better, right?\n\nThey say yes \u2014 they have committed to the concept before you have asked for the appointment. The appointment is now a formality, not a negotiation."}, {"title": "Booking with Two Options", "content": "Never ask when works for you \u2014 open-ended questions invite stalling.\n\nAlways give two specific options: I have our specialist who handles all the numbers. He has time on [Day] evening around 6:30 or [Day plus 1] around the same time \u2014 which one works better for your schedule?\n\nTwo options, both yours to give. They pick one. Appointment set. If they push back on both, offer a third \u2014 but never open it up completely."}, {"title": "The Confirmation Lock", "content": "Text within 5 minutes of leaving.\n\nHey [name], this is [your name] with RIV Solar \u2014 confirming your appointment [Day] at [Time] with [closer name]. He will have everything specific to your home and your utility account. See you then.\n\nThis one habit reduces no-shows by 40 percent. It makes the appointment real \u2014 a confirmed meeting with a name and a time. Most reps skip this step. Most reps have 40 percent no-show rates. Those two facts are directly connected."}]}, {"id": 4, "tag": "OBJECTIONS", "title": "Objection Handling: The Full System", "color": "#F472B6", "badge": "chip-pink", "time": "60 min", "level": "Required \u2014 All Reps", "summary": "Objections are not rejections. They are requests for more information, delivered defensively. Master the LAER framework and the most common solar objections.", "why": "The rep who handles objections best earns the most. Every not interested you convert is a direct multiplier on your paycheck. This module covers the full system \u2014 not just scripts, but the psychology of why objections happen.", "sections": [{"title": "The LAER Framework", "content": "LAER stands for Listen, Acknowledge, Explore, Respond. Used by the top door-to-door solar reps nationwide.\n\nLISTEN: Actually hear the objection. Do not start forming your response while they are still talking. The homeowner will sense whether you listened.\n\nACKNOWLEDGE: I totally get that. That is fair. I hear you. Never argue with the surface objection \u2014 you will lose even if you are right.\n\nEXPLORE: Can I ask what specifically concerns you about it? Find the real objection under the surface one. Eighty percent of the time the stated objection is not the real one.\n\nRESPOND: Now address the real objection with a specific, genuine answer \u2014 not a generic script."}, {"title": "Not Interested", "content": "This is a reflex, not a decision. The homeowner has not heard your value yet.\n\nResponse: That is fair \u2014 most people say that before they see what their neighbors are doing. I am not here to sell you anything today. I just want to make sure you at least have the information before you decide. Can I show you one thing real quick?\n\nThis works because: you agreed so they relax, you removed pressure by saying not here to sell, you created curiosity about the neighbors, and you asked for micro-commitment \u2014 one thing real quick \u2014 not a full appointment."}, {"title": "I Need to Talk to My Spouse", "content": "This is the most common stall and it is almost always genuine. Do not fight it \u2014 solve it.\n\nAbsolutely \u2014 that is exactly why I would want both of you there for the appointment. The numbers are specific to your home and your utility account, and honestly the questions your partner will have are usually the best ones. Can we set something up when you are both available?\n\nYou just turned the spouse from an obstacle into an asset. The objection is now the reason to book the appointment."}, {"title": "We Already Have Solar", "content": "Oh nice \u2014 how long have you had it? Build genuine rapport and show real interest.\n\nThen: Are you guys happy with it? The reason I ask is a lot of homeowners with older systems are looking at adding storage now, or upgrading to get the new incentives. Would it be worth a quick look at your current setup?\n\nExisting solar customers can be in-market for battery add-ons or system upgrades. Never walk away without exploring."}, {"title": "The Price Is Too High", "content": "This almost always means they do not yet understand the value proposition \u2014 not that they literally cannot afford it.\n\nI totally hear that \u2014 and I would not be here if I did not think this could actually lower your monthly costs. The way most of our systems work, the monthly payment replaces your utility bill, usually at a lower number. So it is not an additional expense. Can I show you one quick comparison?\n\nAlways move to a specific example. Numbers are more convincing than concepts. A homeowner who sees their actual projected savings almost never leads with price again."}, {"title": "I Have to Think About It", "content": "This usually means there is an unaddressed objection you have not surfaced yet.\n\nAbsolutely \u2014 what specifically do you need to think through? Let us make sure we have covered everything before I leave.\n\nThis question forces the real objection to the surface. Once it is on the table, you can address it. If you let them say I will think about it and walk away, you have a 90 percent chance of never hearing from them again."}]}, {"id": 5, "tag": "PSYCHOLOGY", "title": "The Psychology of D2D Sales", "color": "#06B6D4", "badge": "chip-blue", "time": "35 min", "level": "Recommended \u2014 All Reps", "summary": "The best D2D reps are not the best talkers. They are the best listeners, the best readers of people, and the best at making homeowners feel genuinely understood.", "why": "Techniques without psychology are just scripts. Psychology without techniques is just conversation. You need both. This module gives you the mental models that separate good reps from great ones.", "sections": [{"title": "Mirroring and Labeling", "content": "From FBI hostage negotiator Chris Voss, two techniques directly applicable to D2D solar:\n\nMIRRORING: Repeat the last 2 to 3 words the homeowner says as a question. My bill was $340 last month. Response: Three forty last month? This signals you are listening and encourages them to keep talking. The more they talk, the more you understand their pain.\n\nLABELING: Identify their emotional state and name it. It seems like you have had a bad experience with salespeople before. They almost always say yeah, actually \u2014 and the wall comes down. You validated their emotion without agreeing with their conclusion."}, {"title": "The Power of Silence", "content": "Most reps are terrified of silence and fill every pause with more talking. This makes them sound desperate and overwrites the impact of what they just said.\n\nAfter a strong statement or closing question: stop. Let it land. Count to five in your head if you need to. The homeowner who feels the need to fill the silence will often talk themselves into the appointment.\n\nRule: whoever speaks first after a close loses. Make sitting in silence a practiced skill."}, {"title": "Social Proof: The Neighborhood Effect", "content": "Humans make decisions based on what the people around them are doing \u2014 especially their neighbors. This is not manipulation; it is psychology.\n\nA few of your neighbors on this street already went through this process is more convincing than any feature list you could give. If you have set appointments or closed deals in that neighborhood, mention it without naming homeowners. If you have not, find out from your team if anyone has.\n\nNeighborhood social proof is your single most powerful credibility tool at the door."}, {"title": "Real Urgency vs. Fake Pressure", "content": "Fake urgency \u2014 this offer expires today \u2014 destroys trust and is immediately detectable. Real urgency is about facts.\n\nReal urgency in solar: utility rates are increasing, which is a documented fact. The federal ITC of 30 percent has a legislative timeline. Install backlogs mean starting the process sooner translates to saving sooner.\n\nUse real urgency. State it matter-of-factly, not desperately. Just so you know, the federal credit situation has a timeline \u2014 people who lock in now get the full benefit. That is not pressure. That is information."}, {"title": "The Growth Mindset on the Doors", "content": "Every door that closes in your face is data. Every objection is a pattern you are learning to recognize. Every not interested you convert is a skill compounding.\n\nTop reps debrief after every door \u2014 mentally if not verbally. What happened? What did I say that worked? What triggered the shutdown?\n\nThe reps who grow fastest are obsessive about their own process. They review, adjust, and go back out. The reps who plateau blame homeowners for the outcome instead of examining their own inputs. One mindset builds a career. The other one does not."}]}, {"id": 6, "tag": "CLOSING", "title": "The In-Home Close", "color": "#F59E0B", "badge": "chip-gold", "time": "50 min", "level": "Advanced \u2014 Setter to Closer Transition", "summary": "For setters ready to transition into the closer role. Covers the full in-home presentation framework, buying signals, in-home objections, and how to ask for the business.", "why": "The closer's job starts where the setter's ends. The best closers understand the set so well they pick up exactly where the setter left off \u2014 no reset, no re-sell. This module bridges that gap.", "sections": [{"title": "The In-Home Framework", "content": "A repeatable framework \u2014 not a rigid script. The objective of each phase:\n\n1. RE-RAPPORT (5 minutes): Rebuild the connection. The homeowner has had time to cool off since the set. Be personal and genuine \u2014 not transactional.\n\n2. DISCOVERY (10 minutes): Understand their specific utility situation, ownership timeline, and financial picture. Listen more than you talk.\n\n3. PROBLEM PRESENTATION (5 minutes): Show them their utility trajectory with real numbers. Make the problem feel personal and immediate.\n\n4. SOLUTION PRESENTATION (15 minutes): Walk through the proposal specific to their home. Never use generic numbers in an in-home presentation.\n\n5. FINANCING (10 minutes): Compare what they pay now versus what they would pay with solar. Show multiple options.\n\n6. THE CLOSE (5 minutes): Ask for the business directly. No dancing around it."}, {"title": "Reading Buying Signals", "content": "Verbal signals: How long does installation take? What is the process after this? Can we do it before summer? These are buying signals. The homeowner is mentally in. Do not keep presenting \u2014 close.\n\nNon-verbal: leaning forward, asking to see the proposal again, calling a spouse into the room. When the homeowner's body language shifts from skeptical to engaged, you are close. Move toward the close \u2014 not toward more presentation.\n\nThe most common mistake closers make is continuing to pitch after the homeowner has already decided. Learn to recognize the moment and act on it."}, {"title": "Handling In-Home Objections", "content": "I need to think about it: Absolutely \u2014 what specifically do you need to think through? Let us make sure we have covered everything before I leave.\n\nI want to get other quotes: That is fair. While you do that, would you want to at least start the paperwork so we are not delayed if you decide to move forward? It does not commit you to anything.\n\nThe payment is too high: If we could structure it at a payment closer to your comfort zone, is that the only thing standing between us and moving forward? Isolate the objection. If they say yes, you have a path to close."}, {"title": "The Direct Close", "content": "Most reps do not close because they are afraid to ask. The ask is not aggressive \u2014 it is respectful.\n\nBased on everything we have gone through today \u2014 the numbers make sense for your situation. Are you ready to move forward?\n\nThen stop talking. The next person who speaks loses. If they have an objection, it surfaces. If they say yes, you are done.\n\nThe direct close is the most underused tool in solar sales. Most reps dance around the ask with soft language that gives the homeowner permission to stall. Learn to ask clearly and sit in the silence after."}]}];
const CAREER = [{"role": "Setter", "color": "#8a8aa0", "dot": "#555555", "desc": "Entry point. Master the door, the set, and the tie-down.", "summer": "3 closed deals/month", "pre": "3 closed deals/month", "post": "3 closed deals/month", "promo": "15 closed deals OR 10 installs in 3 months", "monthly": "$2,000\u2013$8,000/mo", "annual": "$30,000\u2013$55,000/yr", "top2025": "Top Rookie Setter: $100,000 in 2025", "next": "Setter Captain"}, {"role": "Setter Captain", "color": "#a78bfa", "dot": "#7C3AED", "desc": "Top setter. Mentors new reps and leads by example on the doors.", "summer": "4 closed deals/month", "pre": "4 closed deals/month", "post": "4 closed deals/month", "promo": "15 closed deals OR 10 installs in 3 months", "monthly": "$5,000\u2013$12,000/mo", "annual": "$55,000\u2013$100,000/yr", "top2025": "", "next": "Closer"}, {"role": "Closer", "color": "#fbbf24", "dot": "#F59E0B", "desc": "In-home presentation specialist. Owns the appointment and the close.", "summer": "5 closed deals/month", "pre": "5 closed deals/month", "post": "5 closed deals/month", "promo": "3 closers under you to move to Manager", "monthly": "$8,000\u2013$30,000/mo", "annual": "$80,000\u2013$200,000/yr", "top2025": "Top Rookie Closer: $200,000 | Top Vet Closer: $1,200,000 in 2025", "next": "Manager"}, {"role": "Manager", "color": "#34d399", "dot": "#10B981", "desc": "Leads a team of closers. Production plus full override on your team.", "summer": "6 closed deals/month", "pre": "6 closed deals/month", "post": "6 closed deals/month", "promo": "15 closers in your office to move to Regional", "monthly": "$20,000\u2013$60,000/mo", "annual": "$200,000\u2013$500,000/yr", "top2025": "Top Manager: $1,200,000 in 2025", "next": "Regional"}, {"role": "Regional", "color": "#22d3ee", "dot": "#06B6D4", "desc": "Regional leader. 15+ closers. Full override on the entire region.", "summer": "15 closers in region", "pre": "15 closers in region", "post": "15 closers in region", "promo": "Build the region const SCHEDULE = [{"time": "8:00 AM", "title": "Morning Nutrition", "note": "Eat before anything else. High protein. Review your opener and two objection responses out loud. Mental reps before physical reps.", "tag": "HOME"}, {"time": "10:15 AM", "title": "Leave for Correlation Meeting", "note": "[MAMBA U: 2111 Atlanta Ave, Riverside CA] [SPARTAN U: Address TBD] [SOLAR X: Address TBD] \u2014 allow 30 min drive time minimum.", "tag": "DRIVE"}, {"time": "11:00 AM", "title": "Correlation Meeting", "note": "Be early. Take notes. Top reps treat the morning meeting like a debrief and prep session \u2014 not just a check-in.", "tag": "OFFICE"}, {"time": "12:00 PM", "title": "Lunch at Meeting", "note": "Eat your packed meal here. High protein, nothing heavy before doors.", "tag": "OFFICE"}, {"time": "12:30 PM", "title": "Drive to Territory", "note": "Objection handling audio on. Pick 2 objections and drill them until you can deliver each without thinking.", "tag": "DRIVE"}, {"time": "1:00 PM", "title": "Doors Open", "note": "First knock by 1pm. No exceptions. Energy is everything \u2014 bring it from knock one to knock last.", "tag": "FIELD"}, {"time": "1:00\u20138:30 PM", "title": "Active Knocking", "note": "Track every interaction: doors knocked, conversations, objections, sets booked. The rep who tracks improves.", "tag": "FIELD"}, {"time": "8:30 PM", "title": "Wrap Up and Debrief", "note": "Log your numbers. What worked today? What did not? Name it specifically \u2014 do not just feel it.", "tag": "FIELD"}, {"time": "9:00 PM", "title": "Dinner and Recovery", "note": "High protein, quick cook. Turkey, rice, and vegetables. 12 minutes. Wind down. Protect your sleep \u2014 it is when you grow.", "tag": "HOME"}, {"time": "Note", "title": "Gym Schedule", "note": "Gym time is individual preference. Some reps train in the morning before the meeting, others train after doors. Find what works for your energy and protect that time.", "tag": "GYM"}];
const HABITS = [{"icon": "\ud83d\udcca", "title": "Track Every Door", "detail": "Top reps know their exact numbers: doors knocked, conversations, sets, close rate. If you do not track it, you cannot improve it. Notes on your phone \u2014 every single day."}, {"icon": "\ud83e\udde0", "title": "Daily Training Review", "detail": "Spend 15 minutes every morning reviewing one module or one objection response \u2014 out loud, not just reading. Verbal repetition is how sales language becomes automatic."}, {"icon": "\ud83d\udcf1", "title": "Send Confirmation Texts Within 5 Minutes", "detail": "Every appointment, every time. The rep who skips this runs a 40 percent no-show rate. The rep who does it runs under 15 percent. This one habit adds $1,000 to $2,000 per month."}, {"icon": "\ud83d\udd04", "title": "Debrief After Every Interaction", "detail": "Not just at the end of the day \u2014 after each door. 30 seconds. What happened? What triggered the outcome? What would you do differently? Obsessive self-review is what separates plateaus from growth."}, {"icon": "\u23f0", "title": "Be at Every Meeting Early", "detail": "Correlation meeting starts at 11. Top reps are there at 10:45. Culture is built in the margins \u2014 before the formal start and after it ends. Be present, be early, contribute."}, {"icon": "\u26a1", "title": "Protect Your Energy", "detail": "Sleep 7 to 8 hours minimum. Eat before doors. Gym after. The physical discipline and the sales performance are directly connected. Reps who take care of their body consistently outperform those who do not."}];

let S = {page:'home',sub:null,data:null,storyRegion:'mamba',trainMod:null,trainLesson:null};

function go(page,sub,data){
  S={page,sub:sub||null,data:data||null,storyRegion:S.storyRegion,trainMod:null,trainLesson:null};
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  const nb=document.getElementById('nb-'+page);
  if(nb) nb.classList.add('on');
  renderView();
}
function goSub(sub,data){S.sub=sub;S.data=data;renderView();}
function back(){
  if(S.trainLesson!=null){S.trainLesson=null;renderView();return;}
  if(S.trainMod!=null){S.trainMod=null;renderView();return;}
  S.sub=null;S.data=null;renderView();
}
function setStoryRegion(k){S.storyRegion=k;renderView();}
function openMod(i){S.trainMod=i;renderView();}
function openLesson(i){S.trainLesson=i;renderView();}

    ${SCHEDULE.map((s,i)=>`<div class="sched-row" ${i===SCHEDULE.length-1?'style="border-bottom:none"':''}><div class="sched-time">${s.time}</div><div class="sched-content"><div class="sched-title">${s.title} ${chipHtml(tagClass[s.tag]||'chip-blue',s.tag)}</div><div class="sched-note">${s.note}</div></div></div>`).join('')}
  </div>
</div>

<div class="section" style="padding-bottom:0">
  <div class="label" style="margin-bottom:14px">Habits of a Top Rep</div>
  ${HABITS.map(h=>`<div class="surface" style="padding:16px;margin-bottom:8px;display:flex;gap:14px;align-items:flex-start"><div style="width:40px;height:40px;border-radius:10px;background:rgba(124,58,237,0.1);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">${h.icon}</div><div><div style="font-size:13px;font-weight:700;margin-bottom:5px">${h.title}</div><div style="font-size:12px;color:#6a6a7a;line-height:1.65">${h.detail}</div></div></div>`).join('')}
</div></div>`;
}

window.addEventListener('load',()=>{
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  if(isIOS&&!navigator.standalone){
    setTimeout(()=>{
      const b=document.createElement('div');
      b.style.cssText='position:fixed;bottom:80px;left:16px;right:16px;background:#0c0c12;border:1px solid #7C3AED;border-radius:12px;padding:12px 14px;font-size:11px;color:#9a9aaa;z-index:999;line-height:1.6;box-shadow:0 4px 20px rgba(0,0,0,0.5)';
      b.innerHTML='📲 <strong style="color:#f0f0f0">Install RIV:</strong> Tap Share then Add to Home Screen <button onclick="this.parentNode.remove()" style="float:right;background:none;border:none;color:#5a5a6a;cursor:pointer;font-size:14px;padding:0">✕</button>';
      document.body.appendChild(b);
      setTimeout(()=>b.remove(),8000);
    },2000);
  }
});
renderView();

</script>
</body>
</html>
